<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('npf_theme')
          if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t
          else document.documentElement.dataset.theme = 'light'
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
    <link rel="icon" href="/police.png" type="image/png" />
    <link rel="apple-touch-icon" href="/police.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f0f4f8" />
    <meta
      name="description"
      content="NPF Election SitRep & Vote Collation System — Nigeria Police Force operational intelligence. Internal use only."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>NPF Election SitRep System</title>
  </head>
  <body class="antialiased">
    <div id="root">
      <p style="margin: 0; padding: 1.25rem; font-family: system-ui, sans-serif; color: #0f172a; background: #eef2f7">
        Loading…
      </p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
